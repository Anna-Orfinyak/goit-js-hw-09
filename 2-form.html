<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <script type="module" crossorigin src="/goit-js-hw-09/2-form.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-09/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/goit-js-hw-09/assets/vendor-CgTBfC_f.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-09/assets/vendor-DkczhqSJ.css">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-09/assets/styles-dC8DfaSo.css">
  </head>
  <body>
    <main>
      <a href="./index.html" class="back-link">Back</a>
      <form class="feedback-form" autocomplete="off">
        <label class="form-label">
          Email
          <input
            class="form-input"
            type="email"
            name="email"
            required
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
            title="Please enter a valid email address"
            autofocus
          />
        </label>
        <label class="form-label">
          Message
          <textarea class="message" name="message" rows="8"></textarea>
        </label>
        <button class="submit-btn" type="submit">Submit</button>
      </form>
    </main>

  </body>
</html>
